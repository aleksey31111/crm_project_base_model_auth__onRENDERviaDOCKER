{% load static %}
<div class="dropdown">
  <a class="nav-link dropdown-toggle" href="#" id="notificationsDropdown" role="button" data-bs-toggle="dropdown">
    <i class="fas fa-bell"></i>
    <span id="unread-count-badge" class="badge bg-danger rounded-pill">{{ unread_count }}</span>
  </a>
  <div class="dropdown-menu dropdown-menu-end" aria-labelledby="notificationsDropdown" style="width: 350px;">
    <div class="dropdown-header">Уведомления</div>
    <div id="notifications-list">
      {% for n in recent_notifications %}
        <a class="dropdown-item {% if not n.is_read %}bg-light{% endif %}" href="{{ n.link|default:'#' }}">
          <strong>{{ n.title }}</strong><br>
          <small>{{ n.message|truncatechars:80 }}</small><br>
          <small class="text-muted">{{ n.created_at|timesince }} назад</small>
        </a>
        {% if not forloop.last %}<div class="dropdown-divider"></div>{% endif %}
      {% empty %}
        <div class="dropdown-item text-muted">Нет уведомлений</div>
      {% endfor %}
    </div>
    <div class="dropdown-divider"></div>
    <a class="dropdown-item text-center" href="{% url 'notifications:notification_list' %}">Все уведомления</a>
  </div>
</div>

<script>
function updateNotifications() {
  fetch('{% url "notifications:unread_count_api" %}')
    .then(response => response.json())
    .then(data => {
      const badge = document.getElementById('unread-count-badge');
      if (data.count > 0) {
        badge.textContent = data.count;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    });
}
setInterval(updateNotifications, 30000);
updateNotifications();
</script>
