{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h3>Удаление</h3>
        <p>Вы уверены, что хотите удалить "{{ object }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'contracts:contract_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
