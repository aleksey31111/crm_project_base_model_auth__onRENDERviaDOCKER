<!-- accounts/templates/accounts/password_change_done.html -->
{% extends "base.html" %}
{% load static %}

{% block title %}Пароль изменен{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-check-circle"></i> Пароль успешно изменен!
                    </h4>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <p class="lead">Ваш пароль был успешно изменен.</p>
                    <p>Теперь вы можете использовать новый пароль для входа в систему.</p>
                    <div class="mt-4">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
                            <i class="fas fa-user"></i> Вернуться в профиль
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
