{% extends 'base.html' %}
{% block title %}Тестовая оплата{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="card text-center">
        <div class="card-header bg-primary text-white">
            <h3>Тестовый платёж</h3>
        </div>
        <div class="card-body">
            <p class="lead">Контракт: <strong>{{ contract.number }}</strong></p>
            <p>Сумма к оплате: <strong>{{ request.GET.amount|default:contract.remaining_amount }} ₽</strong></p>
            <p class="text-muted">Это учебная демонстрация – реальные деньги не списываются.</p>
            <button id="payButton" class="btn btn-success btn-lg">
                <i class="fas fa-credit-card"></i> Подтвердить оплату (учебный режим)
            </button>
            <div id="result" class="mt-3"></div>
        </div>
    </div>
</div>
<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.getElementById('payButton').onclick = async function() {
        this.disabled = true;
        document.getElementById('result').innerHTML = '<div class="alert alert-info">Обработка...</div>';
        const yookassaId = '{{ contract.yookassa_payment_id }}';
        if (!yookassaId) {
            document.getElementById('result').innerHTML = '<div class="alert alert-danger">Не найден идентификатор платежа. Обновите страницу.</div>';
            this.disabled = false;
            return;
        }
        try {
            const response = await fetch('{% url "contracts:yookassa_webhook" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    event: 'payment.succeeded',
                    object: { id: yookassaId, status: 'succeeded' }
                })
            });
            if (response.ok) {
                document.getElementById('result').innerHTML = '<div class="alert alert-success">Оплата успешно проведена! Вы будете перенаправлены...</div>';
                setTimeout(() => {
                    window.location.href = '{% url "contracts:contract_detail" contract.id %}?payment_status=succeeded';
                }, 1500);
            } else {
                const errData = await response.json();
                document.getElementById('result').innerHTML = '<div class="alert alert-danger">Ошибка подтверждения: ' + (errData.error || 'попробуйте позже') + '</div>';
                this.disabled = false;
            }
        } catch (err) {
            document.getElementById('result').innerHTML = '<div class="alert alert-danger">Ошибка сети.</div>';
            this.disabled = false;
        }
    };
</script>
{% endblock %}
