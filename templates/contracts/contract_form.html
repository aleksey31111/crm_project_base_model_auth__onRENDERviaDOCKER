{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}Редактирование контракта{% else %}Новый контракт{% endif %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header"><h3>{% if form.instance.pk %}Редактирование{% else %}Создание{% endif %} контракта</h3></div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'contracts:contract_list' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
